<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <style>
      .word { font-family: 'Space Grotesk', Arial, Helvetica, sans-serif; font-weight: 800; fill: #0AA3A3; font-size:200px; letter-spacing: -8px }
      .tag  { font-family: 'Space Grotesk', Arial, Helvetica, sans-serif; font-weight: 600; fill: #0F1724; font-size:28px }
      .domain{ font-family: 'Space Grotesk', Arial, Helvetica, sans-serif; font-weight: 500; fill: #475569; font-size:22px }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>
