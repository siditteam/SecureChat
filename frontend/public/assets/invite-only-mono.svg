<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img">
  <title>Invite-only (mono)</title>
  <rect width="100%" height="100%" fill="#111827" rx="20"/>
  <g transform="translate(60,40)">
    <g transform="translate(0,10)">
      <circle cx="70" cy="70" r="70" fill="#ffffff" opacity="0.12" />
      <g transform="translate(35,40)" fill="#ffffff">
        <rect x="-12" y="-18" width="40" height="28" rx="6" fill="#ffffff" opacity="0.06" />
        <rect x="-2" y="-6" width="20" height="8" rx="3" fill="#ffffff" opacity="0.85"/>
      </g>
    </g>
    <g transform="translate(180,40)">
      <text x="0" y="40" font-family="Inter, system-ui" font-size="44" fill="#ffffff" font-weight="700">Invite-only.</text>
      <text x="0" y="90" font-family="Inter, system-ui" font-size="22" fill="#9ca3af">Access by invite ensures a trusted community.</text>
    </g>
  </g>
</svg>
