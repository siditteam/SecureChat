<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="300" viewBox="0 0 1600 300" role="img">
  <title>The network grows at the speed of trust. (light)</title>
  <defs>
    <linearGradient id="b1l" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <g transform="translate(80,40)">
    <text x="0" y="80" font-family="Inter, system-ui" font-size="56" fill="url(#b1l)" font-weight="800">The network grows at the speed of trust.</text>
    <text x="0" y="140" font-family="Inter, system-ui" font-size="20" fill="#475569">Invite-only. Encrypted. Vouched. Built for people who trade trust, not attention.</text>
  </g>
  <g transform="translate(1060,40)">
    <rect x="0" y="0" width="420" height="180" rx="12" fill="#f8fafc" opacity="0.9" />
    <g transform="translate(24,24)">
      <circle cx="40" cy="40" r="36" fill="#06b6d4" />
      <circle cx="40" cy="40" r="16" fill="#ffffff" />
      <text x="96" y="48" font-family="Inter, system-ui" font-size="22" fill="#071428" font-weight="700">Invite-only</text>
      <text x="96" y="80" font-family="Inter, system-ui" font-size="16" fill="#64748b">Encrypted • Vouched</text>
    </g>
  </g>
</svg>
